name: "Copilot Setup Steps"

# Run when this file changes to validate it, and allow manual testing.
on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml

jobs:
    # MUST be named `copilot-setup-steps` — Copilot will not pick it up otherwise.
    copilot-setup-steps:
        runs-on: ubuntu-latest

        permissions:
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            # ── Python ────────────────────────────────────────────────────────
            - name: Set up Python 3.11
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"
                  cache: "pip"
                  cache-dependency-path: deploy/requirements.txt

            # Core bot deps (skip heavy audio/STT libs that require native build tools)
            - name: Install Python dependencies
              run: |
                  pip install --upgrade pip
                  # Install packages that are safe to install in CI (no audio hardware needed)
                  pip install \
                    pyTelegramBotAPI \
                    fastapi "uvicorn[standard]" jinja2 bcrypt PyJWT python-multipart requests \
                    openai \
                    pyyaml jsonschema \
                    google-api-python-client google-auth-httplib2 google-auth-oauthlib \
                    pdfminer.six python-docx \
                    psycopg[binary] psycopg-pool pgvector cryptography

            # ── MCP bridge (tools/copilot_telegram_bridge) ────────────────────
            - name: Install MCP bridge dependencies
              run: |
                  pip install -r tools/copilot_telegram_bridge/scripts/requirements.txt

            # ── Test dependencies ─────────────────────────────────────────────
            - name: Install test dependencies
              run: |
                  pip install pytest pytest-asyncio httpx playwright
                  playwright install chromium --with-deps
