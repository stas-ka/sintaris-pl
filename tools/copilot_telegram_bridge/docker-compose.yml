services:
  mcp-telegram-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    image: copilot-mcp-telegram-bridge:latest
    container_name: copilot-mcp-bridge
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - TELEGRAM_TIMEOUT_SECONDS=${TELEGRAM_TIMEOUT_SECONDS:-900}
      - TELEGRAM_LONG_POLL_SECONDS=${TELEGRAM_LONG_POLL_SECONDS:-20}
      - MCP_TRANSPORT=sse
      # 0.0.0.0 so uvicorn accepts traffic from the Docker bridge interface.
      # External access is still restricted to VPS localhost via the port binding below.
      - MCP_HOST=0.0.0.0
      - MCP_PORT=3001
      - TASK_API_PORT=3002
      # Persist task queue to a named volume so /task survives container restarts.
      - TASK_QUEUE_FILE=/data/taris_tasks.json
    volumes:
      - task-queue:/data
    # Bind ports only to VPS localhost — accessible via SSH tunnel only
    ports:
      - "127.0.0.1:3001:3001"
      # Task HTTP API — for local stdio clients to pop tasks queued by the VPS dispatcher
      - "127.0.0.1:3002:3002"
    network_mode: bridge
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3001/sse', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  task-queue:
