# Notes menu — entry point for the notes feature.
# Static layout: Create / List / Back buttons.

title_key: note_menu_header
parse_mode: Markdown

widgets:
  - type: button_row
    buttons:
      - label_key: note_btn_create
        action: note_create

  - type: button_row
    buttons:
      - label_key: note_btn_list
        action: note_list

  - type: button_row
    buttons:
      - label_key: btn_back
        action: menu
