# Note raw view — displays note content as plain text (no Markdown parsing).
# Variables: slug, note_content (raw text)

title: "{note_content}"
parse_mode: ~

widgets:
  - type: button_row
    buttons:
      - label_key: btn_edit
        action: "note_edit:{slug}"
      - label_key: btn_delete
        action: "note_delete:{slug}"

  - type: button_row
    buttons:
      - label_key: btn_read_aloud
        action: "note_tts:{slug}"
      - label_key: btn_back_short
        action: "note_open:{slug}"
