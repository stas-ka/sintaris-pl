# Language selection — three languages plus back button.
# Static layout, no variables required.

title_key: profile_lang_title
parse_mode: ~

widgets:
  - type: button_row
    buttons:
      - label_key: profile_lang_ru
        action: profile_lang_ru

  - type: button_row
    buttons:
      - label_key: profile_lang_en
        action: profile_lang_en

  - type: button_row
    buttons:
      - label_key: profile_lang_de
        action: profile_lang_de

  - type: button_row
    buttons:
      - label_key: btn_back
        action: profile
