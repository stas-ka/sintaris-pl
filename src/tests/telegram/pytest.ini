[pytest]
# Telegram handler regression tests — offline, no Pi required
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
# These tests import heavy Pi-side modules via mocks; keep log output clean
log_cli = false
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
