<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Taris</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="text-center mb-md">
      <div style="font-size:48px">🔑</div>
      <h2 style="margin:8px 0 4px; color:#fff">Forgot Password</h2>
      <p class="text-dim text-sm">Enter your username and choose how to receive the reset link.</p>
    </div>

    {% if error %}
    <div class="login-error">{{ error }}</div>
    {% endif %}
    {% if msg %}
    <div style="background:rgba(0,200,100,.12); border:1px solid rgba(0,200,100,.4);
                border-radius:8px; padding:10px 14px; font-size:13px; margin-bottom:16px; color:#4caf91">
      {{ msg }}
    </div>
    {% endif %}

    <form method="post" action="/forgot-password">
      <label>
        <span class="text-sm text-muted">Username</span>
        <input type="text" name="username" required autocomplete="username"
               placeholder="admin" class="w-full">
      </label>

      <fieldset style="margin-top:16px; border:1px solid var(--border); border-radius:8px; padding:12px 14px">
        <legend style="font-size:12px; color:var(--text-dim); padding:0 6px">Reset via…</legend>
        <label style="display:flex; align-items:center; gap:8px; margin-bottom:8px">
          <input type="radio" name="method" value="telegram" checked>
          <span>📱 Telegram message <small class="text-dim">(account must be linked to Telegram)</small></span>
        </label>
        <label style="display:flex; align-items:center; gap:8px; margin-bottom:8px">
          <input type="radio" name="method" value="email">
          <span>✉️ E-mail <small class="text-dim">(account must have a registered e-mail)</small></span>
        </label>
        <label style="display:flex; align-items:center; gap:8px">
          <input type="radio" name="method" value="admin">
          <span>🛡️ Notify admin <small class="text-dim">(admin will receive the link and reset manually)</small></span>
        </label>
      </fieldset>

      <button type="submit" class="btn btn-accent w-full" style="margin-top:16px; padding:10px; justify-content:center">
        Send Reset Link
      </button>
    </form>

    <p class="text-center text-sm text-dim" style="margin-top:16px">
      <a href="/login">← Back to Login</a>
    </p>
  </div>
</div>
</body>
</html>
