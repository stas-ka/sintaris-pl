<!-- HTMX partial: loaded into #note-editor on note selection -->
<div class="editor-toolbar flex items-center justify-between">
  <input type="text" id="note-title" name="title" value="{{ title }}" class="editor-title-input"
         placeholder="Note title">
  <div class="flex gap-sm" style="align-items:center">
    {% if saved %}<span style="color:#66bb6a;font-size:13px">✓ Saved</span>{% endif %}
    <!-- Voice input -->
    <button class="btn btn-ghost btn-sm" id="note-mic-btn" title="Dictate into note"
            type="button" onclick="noteVoiceInput()">
      <span class="material-icons-round" style="font-size:16px">mic</span>
    </button>
    <!-- Read aloud -->
    <button class="btn btn-ghost btn-sm" id="note-tts-btn" title="Read note aloud"
            type="button" onclick="noteReadAloud()">
      <span class="material-icons-round" style="font-size:16px">volume_up</span>
    </button>
    <button class="btn btn-accent btn-sm"
            hx-post="{{ root_path }}/notes/{{ slug }}/save"
            hx-include="#note-title, #note-body"
            hx-target="#note-editor" hx-swap="innerHTML">
      <span class="material-icons-round" style="font-size:16px">save</span> Save
    </button>
    <button class="btn btn-ghost btn-sm btn-danger"
            hx-delete="{{ root_path }}/notes/{{ slug }}"
            hx-target="#note-list" hx-swap="innerHTML"
            hx-confirm="Delete this note?">
      <span class="material-icons-round" style="font-size:16px">delete</span>
    </button>
  </div>
</div>
<textarea id="note-body" name="content" class="editor-textarea"
          placeholder="Start writing…">{{ content }}</textarea>
<script>
function noteVoiceInput() {
  if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
    const httpsUrl = location.href.replace(/^http:/, 'https:');
    _noteToast('🔒 Mic needs HTTPS — <a href="' + httpsUrl + '" style="color:#ffcdd2">switch now</a>', '#c62828');
    return;
  }
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    _noteToast('❌ Speech recognition not supported. Use Chrome or Edge.', '#c62828');
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const rec = new SR();
  rec.lang = navigator.language || 'ru-RU';
  rec.interimResults = false;
  rec.maxAlternatives = 1;
  const btn = document.getElementById('note-mic-btn');
  const icon = btn.querySelector('.material-icons-round');
  icon.style.color = '#ff5252';
  icon.textContent = 'mic';
  rec.start();
  rec.onresult = function(e) {
    const text = e.results[0][0].transcript;
    const ta = document.getElementById('note-body');
    const pos = ta.selectionStart;
    const before = ta.value.substring(0, pos);
    const after  = ta.value.substring(ta.selectionEnd);
    const sep = (before && !before.endsWith(' ') && !before.endsWith('\n')) ? ' ' : '';
    ta.value = before + sep + text + ' ' + after;
    icon.style.color = '';
  };
  rec.onerror = function(e) {
    icon.style.color = '';
    if (e.error !== 'no-speech') _noteToast('🎤 Voice error: ' + e.error, '#c62828');
  };
  rec.onend = function() { icon.style.color = ''; };
}

function noteReadAloud() {
  if (!window.speechSynthesis) {
    _noteToast('❌ Text-to-speech not supported in this browser.', '#c62828');
    return;
  }
  const btn = document.getElementById('note-tts-btn');
  const icon = btn.querySelector('.material-icons-round');
  if (window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
    icon.style.color = '';
    icon.textContent = 'volume_up';
    return;
  }
  const text = document.getElementById('note-body').value.trim();
  if (!text) { _noteToast('Note is empty.', '#555'); return; }
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = navigator.language || 'ru-RU';
  icon.style.color = '#66bb6a';
  icon.textContent = 'stop';
  utt.onend  = function() { icon.style.color = ''; icon.textContent = 'volume_up'; };
  utt.onerror = function() { icon.style.color = ''; icon.textContent = 'volume_up'; };
  window.speechSynthesis.speak(utt);
}

function _noteToast(msg, bg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:' +
    (bg||'#333') + ';color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:9999;max-width:90vw;text-align:center';
  t.innerHTML = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}
</script>
