{% for n in notes %}
<div class="note-item{{ ' active' if (active_slug is defined and active_slug == n.slug) else '' }}"
     hx-get="{{ root_path }}/notes/{{ n.slug }}" hx-target="#note-editor" hx-swap="innerHTML">
  <div class="note-title">{{ n.title }}</div>
  <div class="note-meta">{{ n.date }}</div>
</div>
{% endfor %}
{% if not notes %}
  <div class="text-dim" style="padding:20px; text-align:center">No notes yet</div>
{% endif %}
