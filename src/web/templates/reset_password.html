<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Taris</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="text-center mb-md">
      <div style="font-size:48px">🔐</div>
      <h2 style="margin:8px 0 4px; color:#fff">Set New Password</h2>
      {% if username %}
      <p class="text-dim text-sm">Setting new password for <strong>{{ username }}</strong></p>
      {% endif %}
    </div>

    {% if error %}
    <div class="login-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/reset-password/{{ token }}">
      <label>
        <span class="text-sm text-muted">New Password</span>
        <input type="password" name="password" required autocomplete="new-password"
               placeholder="••••••" class="w-full" minlength="6" autofocus>
      </label>
      <label style="margin-top:12px; display:block">
        <span class="text-sm text-muted">Confirm Password</span>
        <input type="password" name="confirm" required autocomplete="new-password"
               placeholder="••••••" class="w-full" minlength="6">
      </label>
      <button type="submit" class="btn btn-accent w-full" style="margin-top:16px; padding:10px; justify-content:center">
        Reset Password
      </button>
    </form>

    <p class="text-center text-sm text-dim" style="margin-top:16px">
      <a href="/login">← Back to Login</a>
    </p>
  </div>
</div>
</body>
</html>
