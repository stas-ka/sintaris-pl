# nginx reverse proxy for __DOMAIN__
# Pi1 (OpenClawPI)  — SSH tunnel VPS:127.0.0.1:8082 → Pi1:8080 → /picoassist/
# Pi2 (OpenClawPI2) — SSH tunnel VPS:127.0.0.1:8084 → Pi2:8080 → /picoassist2/
#
# Deployed by install_vps.sh (substitutes __DOMAIN__ at deploy time)

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __DOMAIN__;

    ssl_certificate     /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;   # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;     # managed by Certbot
    include             /etc/letsencrypt/options-ssl-nginx.conf;           # managed by Certbot
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;                # managed by Certbot

    # gzip must stay off — sub_filter needs uncompressed HTML to rewrite paths
    gzip off;

    # ── Pi1 — OpenClawPI — /picoassist/ ──────────────────────────────────────
    location = /picoassist { return 301 /picoassist/; }

    location /picoassist/ {
        proxy_pass            https://127.0.0.1:8082/;
        proxy_ssl_verify      off;                         # Pi uses self-signed cert

        proxy_set_header      Host               $host;
        proxy_set_header      X-Real-IP          $remote_addr;
        proxy_set_header      X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto  $scheme;
        proxy_set_header      Accept-Encoding    "";       # keep upstream uncompressed for sub_filter

        proxy_http_version    1.1;
        proxy_set_header      Upgrade            $http_upgrade;
        proxy_set_header      Connection         $connection_upgrade;

        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 10s;
        proxy_buffering       off;
        client_max_body_size  20m;

        # Rewrite absolute paths in HTML so the browser stays under /picoassist/
        sub_filter 'href="/'      'href="/picoassist/';
        sub_filter 'src="/'       'src="/picoassist/';
        sub_filter 'action="/'    'action="/picoassist/';
        sub_filter 'hx-get="/'    'hx-get="/picoassist/';
        sub_filter 'hx-post="/'   'hx-post="/picoassist/';
        sub_filter 'hx-put="/'    'hx-put="/picoassist/';
        sub_filter 'hx-delete="/' 'hx-delete="/picoassist/';
        sub_filter_once     off;
        sub_filter_types    text/html;
        proxy_redirect      https://127.0.0.1:8082/ /picoassist/;
        proxy_redirect      /                        /picoassist/;
    }

    # ── Pi2 — OpenClawPI2 — /picoassist2/ ────────────────────────────────────
    location = /picoassist2 { return 301 /picoassist2/; }

    location /picoassist2/ {
        proxy_pass            https://127.0.0.1:8084/;
        proxy_ssl_verify      off;

        proxy_set_header      Host               $host;
        proxy_set_header      X-Real-IP          $remote_addr;
        proxy_set_header      X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto  $scheme;
        proxy_set_header      Accept-Encoding    "";

        proxy_http_version    1.1;
        proxy_set_header      Upgrade            $http_upgrade;
        proxy_set_header      Connection         $connection_upgrade;

        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 10s;
        proxy_buffering       off;
        client_max_body_size  20m;

        sub_filter 'href="/'      'href="/picoassist2/';
        sub_filter 'src="/'       'src="/picoassist2/';
        sub_filter 'action="/'    'action="/picoassist2/';
        sub_filter 'hx-get="/'    'hx-get="/picoassist2/';
        sub_filter 'hx-post="/'   'hx-post="/picoassist2/';
        sub_filter 'hx-put="/'    'hx-put="/picoassist2/';
        sub_filter 'hx-delete="/' 'hx-delete="/picoassist2/';
        sub_filter_once     off;
        sub_filter_types    text/html;
        proxy_redirect      https://127.0.0.1:8084/ /picoassist2/;
        proxy_redirect      /                        /picoassist2/;
    }
}
