# /etc/nginx/stream.d/ssh-tunnel.conf
# SSH-over-443 tunnel via nginx stream
# Routing: no TLS (raw SSH) -> sshd:22 | TLS (HTTPS) -> nginx:8443
# $ssl_preread_protocol is empty for non-TLS connections (SSH)

map $ssl_preread_protocol $upstream {
    ""       ssh_backend;    # no TLS handshake = SSH or raw TCP
    default  https_backend;  # any TLS version = HTTPS
}

upstream ssh_backend {
    server 127.0.0.1:22;
}

upstream https_backend {
    server 127.0.0.1:8443;
}

server {
    listen 443;
    listen [::]:443;
    ssl_preread on;
    proxy_pass $upstream;
    proxy_connect_timeout 10s;
    proxy_timeout 3600s;
    proxy_socket_keepalive on;
}
