# pg_hba.conf — VPS PostgreSQL 17 (dev2null.de / mail.dev2null.de)
# Last updated: 2026-04-16
# Location: /etc/postgresql/17/main/pg_hba.conf
#
# SECURITY NOTE: The last line allows taris user from any IP — restrict in production!

# TYPE  DATABASE    USER        ADDRESS             METHOD
local   all         postgres                        peer
local   all         all                             peer
host    all         all         127.0.0.1/32        scram-sha-256
host    all         all         <VPS_PUBLIC_IP>/32  scram-sha-256
# Docker bridge networks (change if docker network range differs)
host    all         all         172.18.0.0/16       scram-sha-256
host    all         all         172.17.0.0/16       scram-sha-256
host    all         all         172.20.0.0/16       scram-sha-256
host    espocrm     espouser    172.25.0.0/16       scram-sha-256
host    all         all         ::1/128             scram-sha-256
local   replication all                             peer
host    replication all         127.0.0.1/32        scram-sha-256
host    replication all         ::1/128             scram-sha-256
# Taris user: restrict to specific IPs in production (currently open for taris only)
host    taris       taris       127.0.0.1/32        scram-sha-256
# host    taris       taris       0.0.0.0/0         scram-sha-256   # broad — disable in production
