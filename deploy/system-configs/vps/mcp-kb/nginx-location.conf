# nginx-location.conf — Reference: N8N MCP Server endpoint on agents.sintaris.net
#
# ARCHITECTURE NOTE (v0.3): The MCP server is N8N's built-in MCP Server Trigger.
# N8N is already proxied via the existing nginx config (e.g. /n8n/ location).
# No new nginx location block is required for MCP.
#
# N8N MCP Server Trigger creates the SSE endpoint at:
#   https://agents.sintaris.net/n8n/mcp/<workflow-path>/sse
#
# Taris connects using the Python `mcp` library:
#   from mcp.client.sse import sse_client
#   async with sse_client(url, headers={"X-N8N-API-Key": N8N_KB_API_KEY}) as ...
#
# Optional: If you want a cleaner /mcp-kb/ alias (not required), add:
#
#     location /mcp-kb/ {
#         proxy_pass         http://127.0.0.1:5678/mcp/;  # N8N internal port
#         proxy_http_version 1.1;
#         proxy_set_header   Host              $host;
#         proxy_set_header   X-Real-IP         $remote_addr;
#         proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
#         proxy_set_header   X-Forwarded-Proto $scheme;
#         proxy_set_header   Upgrade           $http_upgrade;
#         proxy_set_header   Connection        "upgrade";
#         proxy_read_timeout    300s;  # SSE long-lived connections
#         proxy_connect_timeout  10s;
#         proxy_send_timeout    300s;
#         proxy_buffering        off;  # REQUIRED for SSE
#         proxy_cache            off;
#     }
#
# Apply with: sudo nginx -t && sudo nginx -s reload
