# HTTPS vhost for ttyd web shell at shell.dev2null.de
server {
    listen 127.0.0.1:8443 ssl;
    server_name shell.dev2null.de;

    ssl_certificate     /etc/letsencrypt/live/shell.dev2null.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shell.dev2null.de/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Basic auth
    auth_basic           "VPS Shell";
    auth_basic_user_file /etc/nginx/ttyd.htpasswd;

    location / {
        proxy_pass         http://127.0.0.1:7681/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
