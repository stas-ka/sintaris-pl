# /etc/gai.conf — IPv4 preference for Ollama/ROCm on SintAItion
#
# Purpose: Go resolver (used by Ollama) prefers IPv6 by default.
# AMD ROCm + Ollama pull fails with IPv6 on this network.
# This line forces IPv4-mapped addresses to be preferred.
#
# Install: sudo cp gai.conf /etc/gai.conf
# Then restart ollama: sudo systemctl restart ollama

precedence ::ffff:0:0/96  100
